# Alembic 数据库迁移配置

[alembic]
script_location = alembic
# URL 由 alembic/env.py 从 DatabaseSettings 动态获取，此值仅作 fallback
sqlalchemy.url = postgresql+asyncpg://smartcs:smartcs_pass@localhost:5432/smartcs

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
