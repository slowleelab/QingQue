# SmartCS Prometheus 采集配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── 应用服务 ──
  - job_name: "bot-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
    scrape_interval: 10s

  - job_name: "assist-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]
    scrape_interval: 10s

  # ── 中间件 Exporter ──
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics
    scheme: http

  - job_name: "milvus"
    static_configs:
      - targets: ["milvus:9091"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # ── Prometheus 自身 ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
