worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── 上游服务定义 ──
    # 机器人服务（宿主机 FastAPI）
    upstream bot_service {
        server host.docker.internal:8000;
    }

    # 坐席辅助服务（宿主机 FastAPI）
    upstream assist_service {
        server host.docker.internal:8001;
    }

    # Grafana
    upstream grafana {
        server grafana:3000;
    }

    # Prometheus
    upstream prometheus {
        server prometheus:9090;
    }

    # ── 路由规则 ──
    server {
        listen 80;
        server_name localhost;

        # 机器人服务 API
        location /api/bot/ {
            proxy_pass http://bot_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 坐席辅助服务 API
        location /api/assist/ {
            proxy_pass http://assist_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 坐席辅助 WebSocket
        location /api/assist/ws/ {
            proxy_pass http://assist_service/api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Grafana 监控面板
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 前端静态资源
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 健康检查
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }

    # ── Higress 生产配置参考 ──
    # 生产环境使用 Higress 替代 Nginx，以下为 K8s Ingress 配置参考：
    #
    # apiVersion: networking.k8s.io/v1
    # kind: Ingress
    # metadata:
    #   name: smartcs-ingress
    #   annotations:
    #     higress.io/destination: smartcs
    # spec:
    #   rules:
    #   - http:
    #       paths:
    #       - path: /api/bot
    #         backend:
    #           service:
    #             name: bot-service
    #             port:
    #               number: 8000
    #       - path: /api/assist
    #         backend:
    #           service:
    #             name: assist-service
    #             port:
    #               number: 8001
}
