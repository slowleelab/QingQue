worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        location /api/chat/   { proxy_pass http://host.docker.internal:8000/api/chat/;   proxy_set_header Host $host; }
        location /api/kb/     { proxy_pass http://host.docker.internal:8000/api/kb/;     proxy_set_header Host $host; }
        location /api/health  { proxy_pass http://host.docker.internal:8000/api/health;  proxy_set_header Host $host; }
        location /api/metrics { proxy_pass http://host.docker.internal:8000/metrics;     proxy_set_header Host $host; }
        location /api/notify   { proxy_pass http://host.docker.internal:8001/api/notify;   proxy_set_header Host $host; }
        location /api/session/ { proxy_pass http://host.docker.internal:8001/api/session/; proxy_set_header Host $host; }
        location /api/hold     { proxy_pass http://host.docker.internal:8001/api/hold;     proxy_set_header Host $host; }
        location /api/resume   { proxy_pass http://host.docker.internal:8001/api/resume;   proxy_set_header Host $host; }
        location /api/review/  { proxy_pass http://host.docker.internal:8001/api/review/;  proxy_set_header Host $host; }
        location /api/feedback { proxy_pass http://host.docker.internal:8001/api/feedback; proxy_set_header Host $host; }
        location /api/analyze  { proxy_pass http://host.docker.internal:8001/api/analyze;  proxy_set_header Host $host; }
        location /api/ws/ {
            proxy_pass http://host.docker.internal:8001/api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600;
        }
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
