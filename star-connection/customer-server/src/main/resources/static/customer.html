<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户测试工具 - 在线客服系统</title>
    <link rel="stylesheet" href="css/customer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo"><i class="fas fa-headset"></i> 在线客服</h1>
            </div>
            <div class="header-center">
                <span class="connection-status" id="connectionStatus">
                    <i class="fas fa-circle"></i> 未连接
                </span>
            </div>
            <div class="header-right">
                <div class="customer-info">
                    <span id="customerNameDisplay">未登录</span>
                </div>
            </div>
        </header>

        <!-- 登录区域 -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-user"></i>
                    <h2>客户登录</h2>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label for="loginCustomerId">客户ID</label>
                        <input type="text" id="loginCustomerId" placeholder="请输入客户ID" value="customer-001">
                    </div>
                    <div class="form-group">
                        <label for="loginCustomerName">客户名称</label>
                        <input type="text" id="loginCustomerName" placeholder="请输入您的名称" value="测试客户">
                    </div>
                    <button class="btn btn-primary btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> 开始咨询
                    </button>
                </div>
            </div>
        </div>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 聊天区域 -->
            <section class="chat-panel">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <span class="agent-name" id="agentName">客服</span>
                        <span class="session-status" id="sessionStatus">等待接入</span>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state" id="emptyChatState">
                        <i class="fas fa-comments"></i>
                        <p>登录后开始咨询</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-toolbar">
                        <button class="toolbar-btn" title="表情" disabled>
                            <i class="far fa-smile"></i>
                        </button>
                        <button class="toolbar-btn" title="图片" disabled>
                            <i class="far fa-image"></i>
                        </button>
                        <button class="toolbar-btn" title="文件" disabled>
                            <i class="far fa-folder"></i>
                        </button>
                    </div>
                    <div class="input-compose">
                        <div class="input-wrapper">
                            <textarea id="messageInput" placeholder="输入消息..." disabled rows="1"></textarea>
                        </div>
                        <button class="btn-send" id="sendBtn" disabled title="发送">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 右侧：信息面板 -->
            <aside class="info-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-info-circle"></i> 会话信息</h3>
                </div>
                <div class="info-content" id="infoContent">
                    <div class="empty-state" id="emptyInfoState">
                        <i class="fas fa-info"></i>
                        <p>暂无会话信息</p>
                    </div>
                </div>
                <div class="session-details" id="sessionDetails" style="display: none;">
                    <div class="info-item">
                        <label>会话ID</label>
                        <span id="infoSessionId">-</span>
                    </div>
                    <div class="info-item">
                        <label>会话状态</label>
                        <span id="infoSessionStatus">-</span>
                    </div>
                    <div class="info-item">
                        <label>坐席</label>
                        <span id="infoAgentNameDisplay">等待分配</span>
                    </div>
                    <div class="info-item">
                        <label>开始时间</label>
                        <span id="infoStartTime">-</span>
                    </div>
                    <div class="info-item">
                        <label>消息数</label>
                        <span id="infoMessageCount">0</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-danger" id="endSessionBtn">
                            <i class="fas fa-phone-slash"></i> 结束会话
                        </button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 通知提示 -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="js/customer.js"></script>
</body>
</html>
