# ============================================================
# Nginx 配置文件 - 坐席工作台前后端分离部署
# ============================================================
#
# 使用说明:
# 1. 将此文件复制到 /etc/nginx/conf.d/ 或包含在 nginx.conf 中
# 2. 修改 upstream backend_cluster 为实际的后端服务地址
# 3. 修改 server_name 为实际域名
# 4. 修改 root 为前端静态文件的实际部署路径
# 5. 重载 nginx: nginx -s reload
#
# 架构说明:
#   浏览器 ──► Nginx (80/443)
#                ├── /          → 静态文件 (前端)
#                ├── /api/      → 反向代理到后端
#                └── /ws/       → WebSocket 反向代理到后端
# ============================================================

# 后端服务集群配置
upstream backend_cluster {
    # 负载均衡策略: least_conn (最少连接数)
    least_conn;

    # 后端服务节点列表
    server 127.0.0.1:8081 weight=1;
    # server 127.0.0.1:8082 weight=1;
    # server 192.168.1.101:8081 weight=1;
    # server 192.168.1.102:8081 weight=1;

    # 健康检查 (需要 nginx plus 或使用第三方模块)
    # keepalive 32;
}

# HTTP 服务器配置
server {
    listen 80;
    server_name agent.example.com;

    # 字符编码
    charset utf-8;

    # 访问日志
    access_log /var/log/nginx/agent-frontend.access.log;
    error_log /var/log/nginx/agent-frontend.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript;

    # ============================================================
    # 静态资源服务 (前端)
    # ============================================================
    root /var/www/agent-frontend;
    index index.html;

    # 主页
    location = / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件不缓存
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================================
    # API 反向代理
    # ============================================================
    location /api/ {
        proxy_pass http://backend_cluster/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 错误页面
        proxy_intercept_errors off;
    }

    # ============================================================
    # WebSocket 反向代理
    # ============================================================
    location /ws/agent {
        proxy_pass http://backend_cluster/ws/agent;
        proxy_http_version 1.1;

        # WebSocket 升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时配置 (长连接)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # 禁用缓冲，确保消息实时传输
        proxy_buffering off;
    }

    # ============================================================
    # 错误页面
    # ============================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/agent-frontend;
    }
}

