apiVersion: apps/v1
kind: Deployment
metadata:
  name: kp-worker
  labels:
    app: knowledge-platform
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-platform
      component: worker
  template:
    metadata:
      labels:
        app: knowledge-platform
        component: worker
    spec:
      containers:
        - name: worker
          image: knowledge-platform:latest
          command: ["python", "-m", "app.worker.consumer"]
          envFrom:
            - secretRef:
                name: kp-secrets
            - configMapRef:
                name: kp-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          # 优雅停机：等待 in-flight 消息处理完成
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "import os, signal; os.kill(1, signal.SIGTERM)"]
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kp-config
data:
  KP_ENVIRONMENT: production
  KP_LOG_LEVEL: INFO
  POSTGRES_HOST: postgres-svc
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis-svc
  REDIS_PORT: "6379"
  ES_HOSTS: http://elasticsearch-svc:9200
  MINIO_ENDPOINT: minio-svc:9000
  KAFKA_BOOTSTRAP_SERVERS: kafka-svc:9092
  RAG_EMBEDDING_PROVIDER: tei
  RAG_TEI_BASE_URL: http://tei-embed-svc:80
  RAG_TEI_RERANK_BASE_URL: http://tei-rerank-svc:80
