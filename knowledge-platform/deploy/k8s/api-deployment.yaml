apiVersion: apps/v1
kind: Deployment
metadata:
  name: kp-api
  labels:
    app: knowledge-platform
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-platform
      component: api
  template:
    metadata:
      labels:
        app: knowledge-platform
        component: api
    spec:
      containers:
        - name: api
          image: knowledge-platform:latest
          ports:
            - containerPort: 8100
          envFrom:
            - secretRef:
                name: kp-secrets
            - configMapRef:
                name: kp-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # 存活探针：进程活着就行
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # 就绪探针：所有依赖可用才进流量
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # 优雅停机：给 k8s 时间摘除 Endpoints
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kp-api
spec:
  selector:
    app: knowledge-platform
    component: api
  ports:
    - port: 80
      targetPort: 8100
      protocol: TCP
  type: ClusterIP
