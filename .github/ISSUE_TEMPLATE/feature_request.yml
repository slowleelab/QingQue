name: ✨ 功能建议
description: 提出一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么痛点？（如"我在做 X 时总是遇到……"）
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的实现方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 考虑过的其他方案
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 相关链接、示例、截图等
