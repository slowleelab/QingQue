name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: agent
        run: poetry install --no-interaction
      - name: Ruff check
        working-directory: agent
        run: poetry run ruff check smartcs/ tests/
      - name: Ruff format check
        working-directory: agent
        run: poetry run ruff format --check smartcs/
      - name: Mypy type check
        working-directory: agent
        run: poetry run mypy smartcs/ || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: smartcs_pass
          POSTGRES_USER: smartcs
          POSTGRES_DB: smartcs
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_HOST: localhost
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: smartcs_pass
      SMARTCS_ENVIRONMENT: development
      SMARTCS_RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: agent
        run: poetry install --no-interaction
      - name: Generate gRPC stubs
        working-directory: agent
        run: poetry run python scripts/generate_grpc.py
      - name: Run unit tests
        working-directory: agent
        run: poetry run pytest --ignore=tests/test_bot_api.py --ignore=tests/test_assist_api.py --ignore=tests/test_session_lifecycle_e2e.py --ignore=tests/test_integration.py -v --tb=short

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: deploy
        run: docker build -t smartcs:${{ github.sha }} .
